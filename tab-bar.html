<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Liquid Glass Tab Bar</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'SF Pro Display', sans-serif;
      min-height: 100dvh;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
      overflow: hidden;
    }

    /* ── Background decorations ── */
    .bg-blur-1 {
      position: fixed;
      width: 320px;
      height: 320px;
      border-radius: 9999px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.35) 0%, transparent 70%);
      top: -80px;
      left: -80px;
      pointer-events: none;
    }

    .bg-blur-2 {
      position: fixed;
      width: 280px;
      height: 280px;
      border-radius: 9999px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, transparent 70%);
      top: 40%;
      right: -60px;
      pointer-events: none;
    }

    .bg-blur-3 {
      position: fixed;
      width: 240px;
      height: 240px;
      border-radius: 9999px;
      background: radial-gradient(circle, rgba(236, 72, 153, 0.25) 0%, transparent 70%);
      bottom: 120px;
      left: 20%;
      pointer-events: none;
    }

    /* ── Page content ── */
    .page {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding-bottom: calc(100px + var(--safe-bottom));
    }

    .page-icon {
      width: 80px;
      height: 80px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .page-title {
      font-size: 32px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: -0.5px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .page-sub {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 400;
    }

    /* ════════════════════════════════════
       Liquid Glass Tab Bar
       Figma: rgba(247,247,247) glass + #ededed active pill
       ════════════════════════════════════ */

    /* Wrapper: pill (flex: 1) + search circle (56px), gap: 16px */
    .tab-bar-wrapper {
      position: fixed;
      bottom: calc(16px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      width: min(calc(100% - 32px), 520px); /* 32px = 4x */
      display: flex;
      align-items: center;
      gap: 16px; /* 4x — matches Figma gap-[16px] */
      z-index: 100;
    }

    /* ── Shared glass mixin ── */
    .glass {
      background: rgba(247, 247, 247, 0.82);
      backdrop-filter: blur(20px) saturate(180%) brightness(1.04);
      -webkit-backdrop-filter: blur(20px) saturate(180%) brightness(1.04);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow:
        0 8px 24px rgba(0, 0, 0, 0.18),
        0 2px 8px rgba(0, 0, 0, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.92),
        inset 0 -1px 0 rgba(0, 0, 0, 0.04);
    }

    /* ── Main pill (4 tabs) ── */
    .tab-bar-pill {
      flex: 1;
      height: 64px; /* 4x */
      border-radius: 9999px;
      display: flex;
      align-items: center;
      padding: 0 4px; /* 4x */
      position: relative;
    }

    /* Active selection pill — Figma: #ededed */
    .tab-indicator {
      position: absolute;
      top: 4px; /* 4x */
      height: 56px; /* 64 - 4×2 = 56, 4x */
      border-radius: 9999px;
      background: #ededed;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.9),
        0 1px 4px rgba(0, 0, 0, 0.08);
      transition:
        left  0.4s cubic-bezier(0.4, 0, 0.2, 1),
        width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      z-index: 0;
    }

    .tab-items {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 1;
    }

    /* ── Tab item ── */
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px; /* 4x */
      padding: 8px 4px; /* 4x */
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 9999px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      outline: none;
      transition: transform 0.15s ease;
    }

    .tab-item:active { transform: scale(0.88); }

    .tab-icon {
      width: 24px; /* 4x */
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .tab-icon svg {
      width: 24px;
      height: 24px;
      transition: color 0.2s ease;
    }

    /* Default: outline icons, muted color */
    .tab-icon .icon-fill  { display: none; }
    .tab-icon .icon-outline { display: block; }
    .tab-icon svg { color: rgba(34, 34, 34, 0.42); }

    .tab-label {
      font-size: 10px;
      font-weight: 500;
      color: rgba(34, 34, 34, 0.42);
      white-space: nowrap;
      line-height: 1;
      transition: color 0.2s ease, font-weight 0.2s ease;
    }

    /* Active state */
    .tab-item.active .tab-icon { transform: translateY(-1px) scale(1.05); }
    .tab-item.active .tab-icon svg { color: #222; }
    .tab-item.active .tab-label { color: #222; font-weight: 700; }

    /* Home: swap outline → fill on active */
    .tab-item.home-tab.active .icon-outline { display: none; }
    .tab-item.home-tab.active .icon-fill    { display: block; }

    /* ── Search circle (separate from pill) ── */
    .search-btn {
      width: 56px; /* 4x */
      height: 56px;
      flex-shrink: 0;
      border-radius: 9999px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px; /* 4x */
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      outline: none;
      border: none;
      transition: transform 0.15s ease;
    }

    .search-btn:active { transform: scale(0.88); }

    .search-btn .tab-icon svg { color: rgba(34, 34, 34, 0.42); }
    .search-btn .tab-label {
      font-size: 10px;
      font-weight: 500;
      color: rgba(34, 34, 34, 0.42);
      white-space: nowrap;
      line-height: 1;
      transition: color 0.2s ease, font-weight 0.2s ease;
    }

    .search-btn.active .tab-icon { transform: translateY(-1px) scale(1.05); }
    .search-btn.active .tab-icon svg { color: #222; }
    .search-btn.active .tab-label { color: #222; font-weight: 700; }
  </style>
</head>
<body>

  <!-- Background blobs -->
  <div class="bg-blur-1"></div>
  <div class="bg-blur-2"></div>
  <div class="bg-blur-3"></div>

  <!-- Page content -->
  <main class="page">
    <div class="page-icon" id="pageIcon">🏠</div>
    <div class="page-title" id="pageTitle">ホーム</div>
    <div class="page-sub">Liquid Glass Tab Bar</div>
  </main>

  <!-- ═══════════ Tab Bar ═══════════ -->
  <nav class="tab-bar-wrapper" role="navigation" aria-label="メインナビゲーション">

    <!-- 4-tab pill -->
    <div class="tab-bar-pill glass" role="tablist">
      <div class="tab-indicator" id="tabIndicator"></div>
      <div class="tab-items">

        <!-- ホーム — HomeFill (active) / HomeOutline (inactive) -->
        <button class="tab-item home-tab active" data-label="ホーム" data-icon="🏠" role="tab" aria-selected="true">
          <span class="tab-icon">
            <!-- Outline: feather-icons home -->
            <svg class="icon-outline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <!-- Fill: Material home (active only) -->
            <svg class="icon-fill" viewBox="0 0 24 24" fill="currentColor" stroke="none">
              <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
          </span>
          <span class="tab-label">ホーム</span>
        </button>

        <!-- オークション — AuctionHammerOutline -->
        <button class="tab-item" data-label="オークション" data-icon="🔨" role="tab" aria-selected="false">
          <span class="tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <!-- Gavel head: rotated ellipse (oval hammer head) -->
              <ellipse cx="9" cy="8" rx="5.5" ry="2.5" transform="rotate(-45 9 8)"/>
              <!-- Handle from head to lower-right -->
              <line x1="12.5" y1="12.5" x2="20" y2="20"/>
              <!-- Sounding block base -->
              <line x1="2" y1="21" x2="9" y2="21"/>
            </svg>
          </span>
          <span class="tab-label">オークション</span>
        </button>

        <!-- 出品 — CameraOutline -->
        <button class="tab-item" data-label="出品" data-icon="📷" role="tab" aria-selected="false">
          <span class="tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <!-- Camera body -->
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <!-- Lens -->
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </span>
          <span class="tab-label">出品</span>
        </button>

        <!-- おさいふ — WalletOutline -->
        <button class="tab-item" data-label="おさいふ" data-icon="👛" role="tab" aria-selected="false">
          <span class="tab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <!-- Wallet body -->
              <path d="M20 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
              <!-- Wallet top flap -->
              <path d="M16 7V5a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v2"/>
              <!-- Coin pocket -->
              <rect x="16" y="11" width="6" height="5" rx="1"/>
              <!-- Coin dot -->
              <circle cx="19" cy="13.5" r="1" fill="currentColor" stroke="none"/>
            </svg>
          </span>
          <span class="tab-label">おさいふ</span>
        </button>

      </div>
    </div>

    <!-- Search circle — SearchOutline -->
    <button class="search-btn glass" data-label="検索" data-icon="🔍" role="tab" aria-selected="false">
      <span class="tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <span class="tab-label">検索</span>
    </button>

  </nav>

  <script>
    const pillTabs   = document.querySelectorAll('.tab-item');
    const searchBtn  = document.querySelector('.search-btn');
    const indicator  = document.getElementById('tabIndicator');
    const pageTitle  = document.getElementById('pageTitle');
    const pageIcon   = document.getElementById('pageIcon');
    const allTabs    = [...pillTabs, searchBtn];

    function moveIndicator(tab) {
      if (!tab.classList.contains('tab-item')) return; // search is outside pill
      const pill    = tab.closest('.tab-bar-pill');
      const pillRect = pill.getBoundingClientRect();
      const tabRect  = tab.getBoundingClientRect();
      indicator.style.left  = (tabRect.left - pillRect.left) + 'px';
      indicator.style.width = tabRect.width + 'px';
    }

    function hideIndicator() {
      indicator.style.width = '0';
      indicator.style.opacity = '0';
    }

    function showIndicator() {
      indicator.style.opacity = '1';
    }

    allTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        allTabs.forEach(t => {
          t.classList.remove('active');
          t.setAttribute('aria-selected', 'false');
        });
        tab.classList.add('active');
        tab.setAttribute('aria-selected', 'true');

        if (tab.classList.contains('tab-item')) {
          showIndicator();
          moveIndicator(tab);
        } else {
          // search button: hide indicator
          hideIndicator();
        }

        // Animate content
        pageTitle.style.opacity = '0';
        pageIcon.style.opacity  = '0';
        pageIcon.style.transform = 'scale(0.85)';
        setTimeout(() => {
          pageTitle.textContent    = tab.dataset.label;
          pageIcon.textContent     = tab.dataset.icon;
          pageTitle.style.opacity  = '1';
          pageIcon.style.opacity   = '1';
          pageIcon.style.transform = 'scale(1)';
        }, 150);
      });
    });

    // Initialize
    requestAnimationFrame(() => {
      const active = document.querySelector('.tab-item.active');
      if (active) moveIndicator(active);
    });

    window.addEventListener('resize', () => {
      const active = document.querySelector('.tab-item.active');
      if (active) moveIndicator(active);
    });
  </script>
</body>
</html>
